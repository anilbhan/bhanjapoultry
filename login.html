<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Secure admin login for B Bhanja Poultry Supply.">
    <title>Login | B Bhanja Poultry Supply</title>
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
  </head>
  <body class="login-body">
    <main class="login-shell">
      <section class="login-card">
        <a class="navbar-brand d-flex align-items-center gap-2 mb-4" href="/">
          <span class="brand-mark">BB</span>
          <span class="brand-name">B Bhanja Admin</span>
        </a>
        <span class="eyebrow text-success">Secure Login</span>
        <h1>Admin access</h1>
        <p class="text-muted">Sign in to manage website content and business details.</p>
        <div class="alert alert-danger d-none" data-login-alert role="alert"></div>
        <form data-login-form class="mt-4">
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control form-control-lg" id="username" name="username" type="text" autocomplete="username" required>
          </div>
          <div class="mb-4">
            <label class="form-label" for="password">Password</label>
            <input class="form-control form-control-lg" id="password" name="password" type="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn-success btn-lg w-100" type="submit"><i class="bi bi-shield-lock me-2"></i>Login</button>
        </form>
      </section>
    </main>

    <script src="assets/js/login.js"></script>
  </body>
</html>
